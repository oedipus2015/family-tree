<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カスタム家系図テスト</title>

  <!-- FamilyTree 本体 -->
  <script src="familytree.js"></script>

  <!-- カスタムテンプレート定義 -->
  <script>
    // base を継承したカスタムテンプレート
    FamilyTree.templates.custom = Object.assign({}, FamilyTree.templates.base);

    // ノードサイズ
    FamilyTree.templates.custom.size = [200, 80];

    // ノード背景
    FamilyTree.templates.custom.node =
      '<rect x="0" y="0" width="200" height="80" fill="#fff" stroke="#000"></rect>';

    // 名前表示
    FamilyTree.templates.custom.field_0 =
      '<text x="10" y="45" font-size="16">{val}</text>';
  </script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }
    #tree {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="tree"></div>

  <!-- 家系図描画スクリプト -->
  <script src="script.js"></script>
</body>
</html>
